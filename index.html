<!DOCTYPE html>
<html>
<head>
  <title>Asset Tracker Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1.0">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }

    #map {
      height: 100%;
      width: 100%;
    }

    #controls {
      position: absolute;
      z-index: 5;
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      font-family: Arial;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #controls button {
      display: block;
      margin: 5px 0;
    }
  </style>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiVH_h27VOW5ZBTT_4tQ9ichY-MDwCN_c&callback=initMap" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>

<div id="controls">
  <button onclick="toggleDevice('dev:864622044583702')">Toggle Tracker 1</button>
  <button onclick="toggleDevice('dev:864009068531041')">Toggle Tracker 2</button>
</div>

<div id="map"></div>

<script>

const sheetCsvUrl =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSp1AHYZNvhcZwa2V3nTwPHsRMkE14rwYlJB0nebYY7h6GX2ymcnZ-4FrqApZNyv_BnCrCQDy93ZPqf/pub?output=csv";

let map;

// device styling
const deviceStyles = {
  "dev:864622044583702": "red",
  "dev:864009068531041": "blue"
};

// storage
const deviceMarkers = {};
const devicePaths = {};
const deviceState = {};

function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: { lat: 45.6286825, lng: -110.92737890625 }
  });

  Papa.parse(sheetCsvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,

    complete: function(results) {

      const bounds = new google.maps.LatLngBounds();

      results.data.forEach(row => {

        if (!row.Lat || !row.Lon) return;

        const lat = parseFloat(row.Lat);
        const lng = parseFloat(row.Lon);

        if (isNaN(lat) || isNaN(lng)) return;

        const deviceId = row.Device || "unknown";
        const color = deviceStyles[deviceId] || "green";

        // init state
        if (!deviceState[deviceId]) {
          deviceState[deviceId] = {
            markersVisible: true,
            pathVisible: true
          };
        }

        // marker
        const marker = new google.maps.Marker({
          position: { lat, lng },
          map: map,
          title: deviceId,
          icon: `http://maps.google.com/mapfiles/ms/icons/${color}-dot.png`
        });

        // popup
        const infoWindow = new google.maps.InfoWindow({
          content: `
            <b>Device:</b> ${deviceId}<br>
            <b>Lat:</b> ${lat}<br>
            <b>Lon:</b> ${lng}<br>
            <b>Time:</b> ${row.Timestamp || 'N/A'}<br>
            <b>Voltage:</b> ${row.Voltage || 'N/A'}
          `
        });

        marker.addListener("click", () => {
          infoWindow.open(map, marker);
        });

        // store markers
        if (!deviceMarkers[deviceId]) deviceMarkers[deviceId] = [];
        deviceMarkers[deviceId].push(marker);

        // create path
        if (!devicePaths[deviceId]) {
          devicePaths[deviceId] = new google.maps.Polyline({
            path: [],
            geodesic: true,
            strokeColor: color,
            strokeOpacity: 1.0,
            strokeWeight: 3,
            map: map
          });
        }

        devicePaths[deviceId]
          .getPath()
          .push(new google.maps.LatLng(lat, lng));

        bounds.extend(marker.getPosition());
      });

      if (!bounds.isEmpty()) {
        map.fitBounds(bounds);
      }
    }
  });
}

// toggle both markers + path
function toggleDevice(deviceId) {

  const state = deviceState[deviceId];

  if (!state) return;

  state.markersVisible = !state.markersVisible;
  state.pathVisible = !state.pathVisible;

  // markers
  const markers = deviceMarkers[deviceId] || [];
  markers.forEach(m => {
    m.setMap(state.markersVisible ? map : null);
  });

  // path
  const path = devicePaths[deviceId];
  if (path) {
    path.setMap(state.pathVisible ? map : null);
  }
}

window.initMap = initMap;

</script>
</body>
</html>
