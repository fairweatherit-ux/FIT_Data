<!DOCTYPE html>
<html>
<head>
  <title>Asset Tracker Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1.0">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { height: 100%; width: 100%; }
  </style>
  <!-- Google Maps JS API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiVH_h27VOW5ZBTT_4tQ9ichY-MDwCN_c"></script>
  <!-- PapaParse to read CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
<div id="map"></div>
<script>
  // Replace with your published Google Sheet CSV URL
  const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/1zmf59D3-cSEMSEKio867frw-FqjDf-Dqz5Y9tihKl2U/pub?output=csv";

  let map;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: { lat: 45.6286825, lng: -110.92737890625 } // default center
    });

    Papa.parse(sheetCsvUrl, {
      download: true,
      header: true,
      complete: function(results) {
        results.data.forEach(row => {
          if(row.best_lat && row.best_lon){
            const lat = parseFloat(row.best_lat);
            const lng = parseFloat(row.best_lon);

            const marker = new google.maps.Marker({
              position: { lat: lat, lng: lng },
              map: map,
              title: row.timestamp
            });

            const infoWindow = new google.maps.InfoWindow({
              content: `
                <b>Device:</b> ${row.device}<br>
                <b>Voltage:</b> ${row.voltage}<br>
                <b>Time:</b> ${row.timestamp}
              `
            });

            marker.addListener('click', () => infoWindow.open(map, marker));
          }
        });
      }
    });
  }

  window.onload = initMap;
</script>
</body>
</html>
