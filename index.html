<!DOCTYPE html>
<html>
<head>
  <title>Asset Tracker Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1.0">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    #map { height: 100%; width: 100%; }
    #controls {
      position: absolute;
      z-index: 5;
      background: white;
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      font-family: Arial;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #controls button {
      display: block;
      margin: 5px 0;
    }
  </style>
  <!-- Google Maps JS API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAiVH_h27VOW5ZBTT_4tQ9ichY-MDwCN_c&callback=initMap" async defer></script>
  <!-- PapaParse to read CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div id="controls" style="position:absolute; z-index:5; background:white; padding:10px;">
  <button onclick="toggleDevice('dev:864622044583702')">Tracker 1</button>
  <button onclick="toggleDevice('dev:864009068531041')">Tracker 2</button>
</div>
  
<div id="map"></div>
<script>
// Replace with your published Google Sheet CSV URL
const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSp1AHYZNvhcZwa2V3nTwPHsRMkE14rwYlJB0nebYY7h6GX2ymcnZ-4FrqApZNyv_BnCrCQDy93ZPqf/pub?output=csv";

let map;
  
const devicePaths = {};   // stores polylines per device
const deviceMarkers = {}; // stores markers per device
  
const deviceStyles = {
  "dev:864622044583702": "red",
  "dev:864009068531041": "blue"
};

  
function initMap() {
  console.log("initMap running");
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: { lat: 45.6286825, lng: -110.92737890625 }
  });

  Papa.parse(sheetCsvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      console.log("CSV loaded", results.data);
      const bounds = new google.maps.LatLngBounds();

      results.data.forEach(row => {
        // Skip rows without Lat/Lon
        if (!row.Lat || !row.Lon || row.Lat === "" || row.Lon === "") return;

        const lat = parseFloat(row.Lat);
        const lng = parseFloat(row.Lon);
        if (isNaN(lat) || isNaN(lng)) return;

        const deviceId = row.Device || "unknown";
        const color = deviceStyles[row.Device] || "green";
        
        const marker = new google.maps.Marker({
        position: { lat: lat, lng: lng },
        map: map,
        title: deviceId,
        icon: `http://maps.google.com/mapfiles/ms/icons/${color}-dot.png`
      });

        const infoWindow = new google.maps.InfoWindow({
          content: `
            <b>Lat:</b> ${lat}<br>
            <b>Lon:</b> ${lng}<br>
            <b>Time:</b> ${row.Timestamp || 'N/A'}<br>
            <b>Voltage:</b> ${row.Voltage || 'N/A'}<br>
            <b>Device:</b> ${row.Device || 'N/A'}
          `
        });

        marker.addListener('click', () => infoWindow.open(map, marker));
        bounds.extend(marker.getPosition());
      });
// store marker
        if (!deviceMarkers[deviceId]) deviceMarkers[deviceId] = [];
        deviceMarkers[deviceId].push(marker);

        // --- Path (trail) ---
        if (!devicePaths[deviceId]) {
          devicePaths[deviceId] = new google.maps.Polyline({
            path: [],
            geodesic: true,
            strokeColor: color,
            strokeOpacity: 1.0,
            strokeWeight: 3,
            map: map
          });
        }

        const path = devicePaths[deviceId].getPath();
        path.push(new google.maps.LatLng(lat, lng));

        bounds.extend(marker.getPosition());
      });

      if (!bounds.isEmpty()) {
        map.fitBounds(bounds);
      }
    }
  });
}

// --- toggle devices ---
function toggleDevice(deviceId) {

  const markers = deviceMarkers[deviceId] || [];
  const path = devicePaths[deviceId];

  // toggle markers
  markers.forEach(m => {
    if (m.getMap()) {
      m.setMap(null);
    } else {
      m.setMap(map);
    }
  });

  // toggle trail
  if (path) {
   const isVisible = path.getMap() !== null;

  if (isVisible) {
  path.setMap(null);
} else {
  path.setMap(map);
}
}
}

window.initMap = initMap;

</script>
</body>
</html>
